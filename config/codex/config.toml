approval_mode = "read-only"
model = "gpt-5.4"
model_reasoning_effort = "medium"
personality = "pragmatic"

[sandbox_workspace_write]
network_access = true

[shell_environment_policy]
inherit = "core"
exclude = [ "*KEY*", "*TOKEN*", "*SECRET*", "*PASSWORD*", "AWS_*", "GCP_*", "AZURE_*", "SENTRY_*", "GITHUB_*", "NPM_TOKEN", "NODE_AUTH_TOKEN" ]
include = [ "PATH", "HOME", "LANG", "LC_ALL" ]

